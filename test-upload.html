<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upload Test</title>
</head>
<body>

    <h2>Test Image Upload</h2>

    <form
        action="http://localhost:5000/api/uploads/image"
        method="POST"
        enctype="multipart/form-data"
    >
        <input
            type="file"
            name="image"
            accept=".jpg,.jpeg,.png,.webp"
            required
        >

        <br><br>

        <button type="submit">
            Upload Image
        </button>
    </form>

</body>
</html>
